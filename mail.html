<!-- EmailJS: matches mail-form template params (from_name, from_email, reply_to, subject, message) -->
<table
    role="presentation"
    cellpadding="0"
    cellspacing="0"
    width="100%"
    style="
        margin: 0;
        font-family:
            ui-sans-serif,
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            &quot;Segoe UI&quot;,
            Roboto,
            &quot;Helvetica Neue&quot;,
            Arial,
            sans-serif;
    "
>
    <tr>
        <td align="center">
            <table
                role="presentation"
                cellpadding="0"
                cellspacing="0"
                width="100%"
                style="
                    max-width: 480px;
                    background-color: #ffffff;
                    border-radius: 10px;
                    overflow: hidden;
                "
            >
                <tr>
                    <td
                        style="
                            padding: 20px;
                            border-bottom: 1px solid #ebebeb;
                            background-color: #ffffff;
                        "
                    >
                        <p
                            style="
                                margin: 0 0 4px;
                                font-size: 11px;
                                font-weight: 600;
                                letter-spacing: 0.04em;
                                text-transform: uppercase;
                                color: #737373;
                            "
                        >
                            New message from hug.bm-it.ch
                        </p>
                        <h1
                            style="
                                margin: 0;
                                font-size: 18px;
                                font-weight: 600;
                                line-height: 1.35;
                                color: #252525;
                            "
                        >
                            {{from_name}}
                        </h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 20px; background-color: #ffffff">
                        <div
                            style="
                                font-size: 14px;
                                line-height: 1.55;
                                color: #252525;
                            "
                        >
                            {{message}}
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
