<section
    style="
        display: flex;
        flex-direction: column;
        width: 100%;
        margin: 0;
        font-family:
            ui-sans-serif,
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            &quot;Segoe UI&quot;,
            Roboto,
            &quot;Helvetica Neue&quot;,
            Arial,
            sans-serif;
    "
>
    <div
        style="
            width: 100%;
            display: flex;
            justify-content: start;
            align-items: center;
            gap: 4px;
        "
    >
        <p style="margin: 0; font-size: 12px; color: #252525">From:</p>
        <p style="margin: 0; font-size: 12px; color: #73737380">
            {{from_name}}
        </p>
    </div>
    <hr style="width: 100%; border-color: #73737325" />
    <div style="font-size: 14px; line-height: 1.55; color: #252525">
        {{message}}
    </div>
</section>
